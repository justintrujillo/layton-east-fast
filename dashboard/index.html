<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stake Dashboard — 40-Day Fast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0F0E0C;--surface:#1A1916;--border:#2C2A26;--gold:#C4992A;--gold-lt:#E8C96A;--cream:#FAF7F2;--muted:#9E9183;--green:#4CAF82;--yellow:#E8B84B;--red:#E05C4B;--blue:#5B9BD5}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh}
    .skip-link{position:absolute;top:-100%;left:1rem;background:var(--gold);color:var(--bg);padding:.5rem 1rem;border-radius:0 0 6px 6px;font-size:.85rem;font-weight:500;z-index:200;text-decoration:none}
    .skip-link:focus{top:0}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(15,14,12,.92);backdrop-filter:blur(12px);z-index:50}
    .nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold-lt)}
    .nav-brand span{font-size:.7rem;font-family:'Inter',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-right:.5rem}
    .nav-right{display:flex;gap:.75rem;align-items:center}
    .btn-refresh{background:var(--surface);border:1px solid var(--border);color:var(--cream);padding:.45rem 1rem;border-radius:6px;font-size:.75rem;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.05em;transition:border-color .15s}
    .btn-refresh:hover{border-color:var(--gold)}.btn-refresh:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
    .last-updated{font-size:.7rem;color:var(--muted)}
    main{padding:2rem;max-width:1300px;margin:0 auto}

    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem}
    .stat-label{font-size:.65rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
    .stat-value{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;line-height:1}
    .stat-value.gold{color:var(--gold-lt)}.stat-value.green{color:var(--green)}.stat-value.yellow{color:var(--yellow)}
    .stat-sub{font-size:.7rem;color:var(--muted);margin-top:.3rem}

    .ward-filter{display:flex;align-items:center;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .ward-filter-label{font-size:.7rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
    .ward-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:.35rem .85rem;font-size:.72rem;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
    .ward-chip:hover{border-color:var(--gold);color:var(--gold-lt)}
    .ward-chip.active{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:600}
    .ward-chip:focus-visible{outline:3px solid var(--gold);outline-offset:2px}

    .two-col{display:grid;grid-template-columns:1fr 380px;gap:1.5rem;margin-bottom:1.5rem}
    @media(max-width:900px){.two-col{grid-template-columns:1fr}}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-width:100%}
    .panel-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .panel-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600}
    .panel-body{padding:1.5rem}

    /* ── Calendar grid with day-of-week headers ── */
    .cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
    .cal-header-cell{text-align:center;font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.25rem 0}
    .fast-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .fast-day{aspect-ratio:1;min-width:0;min-height:0;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.65rem;font-weight:500;cursor:pointer;transition:transform .1s,box-shadow .15s;position:relative}
    @media(max-width:600px){.panel-body{padding:.75rem}.fast-grid,.cal-header-row{gap:3px}.cal-header-cell{font-size:.55rem;letter-spacing:.05em}main{padding:1rem}}
    .fast-day:hover:not(.outside){transform:scale(1.08);z-index:2}
    .fast-day:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
    .fast-day.covered{background:rgba(76,175,130,.25);border:1px solid rgba(76,175,130,.4);color:var(--green)}
    .fast-day.empty{background:rgba(224,92,75,.15);border:1px solid rgba(224,92,75,.3);color:var(--red)}
    .fast-day.partial{background:rgba(232,184,75,.2);border:1px solid rgba(232,184,75,.35);color:var(--yellow)}
    .fast-day.outside{background:var(--bg);border:1px solid var(--border);color:var(--border);cursor:default;opacity:.4}
    .fast-day.highlighted{box-shadow:0 0 0 3px var(--gold),0 0 12px rgba(196,153,42,.4);z-index:3;transform:scale(1.12)}
    .fast-day .fd-num{font-size:.8rem;line-height:1}
    .fast-day .fd-mon{font-size:.5rem;opacity:.7;margin-top:1px}
    .fast-day .fd-count{position:absolute;top:2px;right:3px;font-size:.5rem;opacity:.8}

    .ward-table{width:100%;border-collapse:collapse}
    .ward-table th{text-align:left;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:0 .75rem .75rem}
    .ward-table td{padding:.6rem .75rem;border-top:1px solid var(--border);font-size:.82rem}
    .ward-row:hover td{background:rgba(255,255,255,.02)}
    .ward-name{font-weight:500}
    .ward-bar-wrap{display:flex;align-items:center;gap:.6rem}
    .ward-bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .ward-bar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .5s ease}
    .ward-pct{font-size:.72rem;color:var(--muted);min-width:2.5rem;text-align:right}

    .leader-lookup{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
    .leader-lookup label{font-size:.7rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
    .leader-select{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:.5rem .85rem;color:var(--cream);font-family:'Inter',sans-serif;font-size:.82rem;min-width:220px;cursor:pointer;transition:border-color .15s}
    .leader-select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,153,42,.15)}
    .leader-select option{background:var(--bg);color:var(--cream)}
    .leader-result{flex:1;font-size:.82rem;color:var(--muted);min-width:200px}
    .leader-result strong{color:var(--gold-lt)}
    .leader-result .lr-families{margin-top:.4rem;font-size:.78rem}
    .leader-result .lr-phone{color:var(--gold)}

    .day-detail{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-top:1rem;font-size:.82rem}
    .day-detail h4{font-family:'Cormorant Garamond',serif;font-size:1rem;margin-bottom:.5rem;color:var(--gold-lt)}
    .day-detail ul{list-style:none}
    .day-detail li{padding:.25rem 0;border-top:1px solid var(--border);color:var(--muted)}
    .day-detail li:first-child{border-top:none}
    .day-detail li span{color:var(--cream)}
    .leader-badge{display:inline-block;background:rgba(196,153,42,.12);border:1px solid rgba(196,153,42,.3);color:var(--gold-lt);font-size:.72rem;font-weight:500;padding:.3rem .7rem;border-radius:5px;margin-bottom:.75rem}

    @keyframes spin{to{transform:rotate(360deg)}}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  </style>
</head>
<body>
<a href="#mainContent" class="skip-link">Skip to dashboard</a>
<nav role="navigation" aria-label="Dashboard navigation">
  <div class="nav-brand"><span>Layton East Stake</span>40-Day Fast Dashboard</div>
  <div class="nav-right">
    <span class="last-updated" id="lastUpdated" aria-live="polite">—</span>
    <button class="btn-refresh" onclick="loadData()" aria-label="Refresh dashboard data">↻ Refresh</button>
  </div>
</nav>
<main id="mainContent">
  <div class="stats-row" role="region" aria-label="Summary statistics">
    <div class="stat-card"><div class="stat-label">Total Sign-Ups</div><div class="stat-value gold" id="statTotal" aria-live="polite">—</div><div class="stat-sub" id="statTotalSub">across all wards</div></div>
    <div class="stat-card"><div class="stat-label">Days Covered</div><div class="stat-value green" id="statCovered" aria-live="polite">—</div><div class="stat-sub" id="statCoveredSub">of 40 fast days</div></div>
    <div class="stat-card"><div class="stat-label">Next 7 Days</div><div class="stat-value yellow" id="statNext7" aria-live="polite">—</div><div class="stat-sub" id="statNext7Sub">across all wards</div></div>
  </div>
  <div class="ward-filter" id="wardFilter" role="radiogroup" aria-label="Filter by ward">
    <span class="ward-filter-label">View</span>
    <button class="ward-chip active" data-ward="all" role="radio" aria-checked="true" onclick="setWardFilter('all')">All Wards</button>
  </div>
  <div class="two-col">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title" id="coverageLabel">40-Day Coverage</div>
        <div id="legendText" style="display:flex;gap:1rem;font-size:.7rem;color:var(--muted);" aria-hidden="true">
          <span style="color:var(--green)">● All wards</span><span style="color:var(--yellow)">● Partial</span><span style="color:var(--red)">● Empty</span>
        </div>
      </div>
      <div class="panel-body">
        <div class="cal-header-row" aria-hidden="true">
          <div class="cal-header-cell">Sun</div><div class="cal-header-cell">Mon</div><div class="cal-header-cell">Tue</div>
          <div class="cal-header-cell">Wed</div><div class="cal-header-cell">Thu</div><div class="cal-header-cell">Fri</div><div class="cal-header-cell">Sat</div>
        </div>
        <div class="fast-grid" id="fastGrid" role="grid" aria-labelledby="coverageLabel"></div>
        <div id="dayDetail" role="region" aria-live="polite"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Ward Participation</div></div>
      <div class="panel-body" style="padding:1rem .5rem;">
        <table class="ward-table" aria-label="Ward participation breakdown">
          <thead><tr><th scope="col">Ward</th><th scope="col">Sign-Ups</th><th scope="col">Days</th><th scope="col" style="min-width:120px">Coverage %</th></tr></thead>
          <tbody id="wardTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="leader-lookup" id="leaderLookup" role="region" aria-label="Find your assignment">
    <label for="leaderSelect">My Assignment</label>
    <select class="leader-select" id="leaderSelect" onchange="showLeaderAssignment()"><option value="">Select your name…</option></select>
    <div class="leader-result" id="leaderResult"></div>
  </div>

</main>
<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbz0Mg3TXC7LsLMIWs_j9IB3uUpxj-wVUnMpUE1fjnhtP8gweuHhXc3mxse7o9wchIA65A/exec';
const FAST_START_STR='2026-04-27', FAST_END_STR='2026-06-05', TOTAL_WARDS=7;
const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL=['January','February','March','April','May','June','July','August','September','October','November','December'];

let stakeData=null, activeWardFilter='all';

function getFamilies(e){if(!e)return[];if(Array.isArray(e))return e;if(Array.isArray(e.families))return e.families;return[]}
function getLeader(e){return(e&&e.leader)||''}

async function loadData(){
  try{const r=await fetch(`${APPS_SCRIPT_URL}?mode=stake`);stakeData=await r.json()}
  catch(e){stakeData=buildDemoData()}
  buildWardFilterChips();renderWithFilter();
  document.getElementById('lastUpdated').textContent=stakeData._demo?'Demo data':'Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function buildWardFilterChips(){
  const c=document.getElementById('wardFilter');
  while(c.children.length>2)c.removeChild(c.lastChild);
  if(!stakeData||!stakeData.wards)return;
  Object.entries(stakeData.wards).sort((a,b)=>a[1].wardName.localeCompare(b[1].wardName)).forEach(([k,w])=>{
    const btn=document.createElement('button');btn.className='ward-chip';btn.dataset.ward=w.wardName;
    btn.setAttribute('role','radio');btn.setAttribute('aria-checked','false');
    btn.textContent=w.wardName;btn.onclick=()=>setWardFilter(w.wardName);c.appendChild(btn);
  });
}
function setWardFilter(w){
  activeWardFilter=w;
  document.querySelectorAll('.ward-chip').forEach(c=>{const a=c.dataset.ward===w;c.classList.toggle('active',a);c.setAttribute('aria-checked',String(a))});
  renderWithFilter();
}

function renderWithFilter(){
  if(!stakeData)return;
  const coverage=stakeData.coverage||{},allDates=Object.keys(coverage).sort();
  const isF=activeWardFilter!=='all',fW=activeWardFilter;

  // Legend
  const leg=document.getElementById('legendText');
  leg.innerHTML=isF?'<span style="color:var(--green)">● Has sign-ups</span><span style="color:var(--red)">● No sign-ups</span>'
    :'<span style="color:var(--green)">● All wards</span><span style="color:var(--yellow)">● Partial</span><span style="color:var(--red)">● Empty</span>';

  // Stats
  let totalSignups=0,coveredDays=0;
  allDates.forEach(d=>{
    const fam=getFamilies(coverage[d]),fil=isF?fam.filter(f=>f.ward===fW):fam;
    totalSignups+=fil.length;
    if(isF){if(fil.length>0)coveredDays++}else{if(new Set(fam.map(s=>s.ward)).size===TOTAL_WARDS)coveredDays++}
  });
  document.getElementById('statTotal').textContent=totalSignups;
  document.getElementById('statTotalSub').textContent=isF?fW:'across all wards';
  document.getElementById('statCovered').textContent=coveredDays;
  document.getElementById('statCoveredSub').textContent=isF?'days with sign-ups':'of 40 fast days';

  // Next 7 days — uses same "covered" definition as Days Covered stat
  let n7c=0,n7t=0;
  for(let i=0;i<7;i++){const d=new Date(Date.now()+i*86400000),k=toDateKey(d);
    if(coverage[k]!==undefined){n7t++;const fam=getFamilies(coverage[k]);
    if(isF){if(fam.filter(f=>f.ward===fW).length>0)n7c++}else{if(new Set(fam.map(s=>s.ward)).size===TOTAL_WARDS)n7c++}}}
  document.getElementById('statNext7').textContent=n7t>0?`${n7c}/${n7t}`:'—';
  document.getElementById('statNext7Sub').textContent=isF?fW:'across all wards';

  renderCalendar(coverage,allDates,isF,fW);
  renderWardTable(stakeData.wards||{},fW);
  populateLeaderDropdown(coverage);
  document.getElementById('dayDetail').innerHTML='';
}

// ── Calendar: Sun–Sat grid with day headers ──
function renderCalendar(coverage,allDates,isF,fW){
  const grid=document.getElementById('fastGrid');
  grid.innerHTML='';

  // Build full Sun–Sat calendar spanning the fast period
  const fastStart=new Date(FAST_START_STR+'T12:00:00'), fastEnd=new Date(FAST_END_STR+'T12:00:00');

  // Find the Sunday on or before the fast start
  const calStart=new Date(fastStart);
  const dow=calStart.getDay(); // 0=Sun
  if(dow!==0) calStart.setDate(calStart.getDate()-dow);

  // Find the Saturday on or after the fast end
  const calEnd=new Date(fastEnd);
  const edow=calEnd.getDay();
  if(edow!==6) calEnd.setDate(calEnd.getDate()+(6-edow));

  const cur=new Date(calStart);
  while(cur<=calEnd){
    const dateKey=toDateKey(cur);
    const isFastDay=allDates.includes(dateKey);
    const [y,m,d]=dateKey.split('-').map(Number);

    if(!isFastDay){
      // Outside fast period — greyed out cell
      const cell=document.createElement('div');
      cell.className='fast-day outside';
      cell.setAttribute('aria-hidden','true');
      cell.innerHTML=`<span class="fd-num">${d}</span><span class="fd-mon">${MONTHS_SHORT[m-1]}</span>`;
      grid.appendChild(cell);
    } else {
      const entry=coverage[dateKey];
      const allFam=getFamilies(entry),fam=isF?allFam.filter(f=>f.ward===fW):allFam;
      const leader=getLeader(entry);
      let cls='fast-day ',countLabel='';

      if(isF){
        cls+=fam.length>0?'covered':'empty';
        if(fam.length>0)countLabel=`<span class="fd-count">${fam.length}</span>`;
      } else {
        const uw=new Set(allFam.map(s=>s.ward)).size;
        if(uw===0)cls+='empty';else if(uw<TOTAL_WARDS)cls+='partial';else cls+='covered';
        if(uw>0)countLabel=`<span class="fd-count">${uw}/${TOTAL_WARDS}</span>`;
      }

      const dateLabel=`${MONTHS_FULL[m-1]} ${d} — ${fam.length} families${leader?`, assigned to ${leader}`:''}`;
      const cell=document.createElement('div');
      cell.className=cls;cell.dataset.date=dateKey;
      cell.setAttribute('role','button');cell.setAttribute('tabindex','0');cell.setAttribute('aria-label',dateLabel);
      cell.innerHTML=`<span class="fd-num">${d}</span><span class="fd-mon">${MONTHS_SHORT[m-1]}</span>${countLabel}`;
      cell.addEventListener('click',()=>showDayDetail(dateKey,fam,leader,isF,fW,allFam));
      cell.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();showDayDetail(dateKey,fam,leader,isF,fW,allFam)}});
      grid.appendChild(cell);
    }
    cur.setDate(cur.getDate()+1);
  }
}

function renderWardTable(wards,filterWard){
  const tbody=document.getElementById('wardTableBody');tbody.innerHTML='';
  const totalDays=generateDateRange(FAST_START_STR,FAST_END_STR).length;
  Object.entries(wards).sort((a,b)=>new Set((b[1].signups||[]).map(s=>s.date)).size-new Set((a[1].signups||[]).map(s=>s.date)).size)
  .forEach(([k,w])=>{
    const s=(w.signups||[]).length,dc=new Set((w.signups||[]).map(s=>s.date)).size,pct=Math.round(dc/totalDays*100);
    const hi=filterWard!=='all'&&w.wardName===filterWard;
    const tr=document.createElement('tr');tr.className='ward-row';if(hi)tr.style.background='rgba(196,153,42,.08)';
    tr.innerHTML=`<td class="ward-name">${w.wardName||k}</td><td>${s}</td><td>${dc}</td><td><div class="ward-bar-wrap"><div class="ward-bar-track" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100" aria-label="${w.wardName} coverage"><div class="ward-bar-fill" style="width:${pct}%"></div></div><span class="ward-pct">${pct}%</span></div></td>`;
    tbody.appendChild(tr);
  });
}

function showDayDetail(dateKey,families,leader,isF,fW,allFam){
  const[y,m,d]=dateKey.split('-').map(Number),label=`${MONTHS_FULL[m-1]} ${d}, ${y}`;
  const detail=document.getElementById('dayDetail');
  const leaderHtml=leader?`<div class="leader-badge">📞 Assigned to call: <strong>${leader}</strong></div>`:'';
  const totalNote=isF&&allFam.length!==families.length?` <span style="font-size:.72rem;color:var(--muted)">(${allFam.length} total across all wards)</span>`:'';
  if(families.length===0){
    detail.innerHTML=`<div class="day-detail"><h4>${label}${totalNote}</h4>${leaderHtml}<p style="color:var(--red);font-size:.8rem">No families signed up${isF?' from '+fW:''} for this day.</p></div>`;
  } else {
    const items=families.map(s=>`<li><span>${s.name}</span> — ${s.ward}${s.phone?`<span style="color:var(--gold);margin-left:.5rem">${s.phone}</span>`:''}</li>`).join('');
    detail.innerHTML=`<div class="day-detail"><h4>${label} · ${families.length} ${families.length===1?'family':'families'}${totalNote}</h4>${leaderHtml}<ul>${items}</ul></div>`;
  }
}

// ── Leader lookup ──
function populateLeaderDropdown(coverage){
  const sel=document.getElementById('leaderSelect'),cv=sel.value;
  sel.innerHTML='<option value="">Select your name…</option>';
  const leaders=new Map();
  Object.keys(coverage).sort().forEach(dk=>{const l=getLeader(coverage[dk]);if(l&&!leaders.has(l))leaders.set(l,dk)});
  [...leaders.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name])=>{
    const o=document.createElement('option');o.value=name;o.textContent=name;sel.appendChild(o);
  });
  if(cv){sel.value=cv;showLeaderAssignment()}
}
function showLeaderAssignment(){
  const name=document.getElementById('leaderSelect').value,result=document.getElementById('leaderResult');
  document.querySelectorAll('.fast-day.highlighted').forEach(el=>el.classList.remove('highlighted'));
  if(!name||!stakeData){result.innerHTML='';return}
  const coverage=stakeData.coverage||{};let ad=null;
  for(const[dk,e]of Object.entries(coverage)){if(getLeader(e)===name){ad=dk;break}}
  if(!ad){result.innerHTML='<span style="color:var(--red)">No assignment found.</span>';return}
  const fam=getFamilies(coverage[ad]),[y,m,d]=ad.split('-').map(Number),dl=`${MONTHS_FULL[m-1]} ${d}, ${y}`;
  let html=`<strong>${dl}</strong>`;
  if(fam.length===0){html+=`<div class="lr-families" style="color:var(--red)">No families signed up yet for your day.</div>`}
  else{html+=`<div class="lr-families">${fam.length} ${fam.length===1?'family':'families'} to call:<br>${fam.map(f=>`${f.name} (${f.ward})${f.phone?`<span class="lr-phone"> · ${f.phone}</span>`:''}`).join('<br>')}</div>`}
  result.innerHTML=html;
  const cell=document.querySelector(`.fast-day[data-date="${ad}"]`);
  if(cell){cell.classList.add('highlighted');cell.scrollIntoView({behavior:'smooth',block:'nearest'})}
}

function toDateKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function generateDateRange(s,e){const d=[],c=new Date(s+'T12:00:00'),l=new Date(e+'T12:00:00');while(c<=l){d.push(toDateKey(c));c.setDate(c.getDate()+1)}return d}
